version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: finsight_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - finsight_network

volumes:
  postgres_data:

networks:
  finsight_network:
    driver: bridge