version: '3.8'

services:
  # The PostgreSQL Database Service
  db:
    image: postgres:16-alpine
    container_name: finsight_postgres
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - finsight_network

  # The Streamlit Web App Service
  web:
    build: .
    container_name: finsight_ui
    restart: always
    env_file:
      - .env
    ports:
      - "8501:8501"
    depends_on:
      - db
    networks:
      - finsight_network

volumes:
  postgres_data:

networks:
  finsight_network:
    driver: bridge